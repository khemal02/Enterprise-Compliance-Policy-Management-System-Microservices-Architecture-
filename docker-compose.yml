  notification-service:
    build:
      context: ./notification
      dockerfile: Dockerfile
    ports:
      - "8087:8087"
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started
    environment:
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/notification_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Killam@123
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      eureka:
        condition: service_started
      auth-service:
        condition: service_started
      employee-service:
        condition: service_started
      compliance-service:
        condition: service_started
      policy-service:
        condition: service_started
      approval-service:
        condition: service_started
      audit-service:
        condition: service_started
      notification-service:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka

volumes:
  mysql-data:
