spring.application.name=gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# ========================
# ROUTES CONFIGURATION
# ========================

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=employee-service
spring.cloud.gateway.routes[1].uri=lb://employee-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/employee/**

spring.cloud.gateway.routes[2].id=audit-service
spring.cloud.gateway.routes[2].uri=lb://audit-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/audit/**

spring.cloud.gateway.routes[3].id=approval-service
spring.cloud.gateway.routes[3].uri=lb://approval-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/approval/**

spring.cloud.gateway.routes[4].id=compliance-service
spring.cloud.gateway.routes[4].uri=lb://compliance-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/compliance/**

spring.cloud.gateway.routes[5].id=policy-service
spring.cloud.gateway.routes[5].uri=lb://policy-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/policy/**

spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].uri=lb://notification-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/notification/**

      
server.port=8080